<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Realtime – Licznik</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html{color-scheme:light;background:#ffffff;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#f0f4f8;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:white;
    border-radius:16px;
    padding:40px 32px;
    box-shadow:0 4px 24px rgba(0,0,0,0.10);
    text-align:center;
    max-width:340px;
    width:100%;
  }
  h1{font-size:1.1rem;color:#555;margin-bottom:8px;font-weight:600;}
  .counter{
    font-size:5rem;
    font-weight:900;
    color:#1a1a2e;
    margin:24px 0;
    line-height:1;
    transition:transform 0.15s;
  }
  .counter.bump{transform:scale(1.18);}
  .buttons{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
  button{
    padding:14px 28px;
    font-size:1.5rem;
    font-weight:800;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform 0.1s, background 0.1s;
  }
  button:active{transform:scale(0.93);}
  .btn-plus{background:#22c55e;color:white;}
  .btn-minus{background:#ef4444;color:white;}
  .btn-reset{
    width:100%;
    padding:10px;
    font-size:0.9rem;
    font-weight:700;
    background:#f1f5f9;
    color:#64748b;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }
  .status{
    margin-top:16px;
    font-size:0.75rem;
    font-weight:600;
    padding:6px 12px;
    border-radius:20px;
    display:inline-block;
  }
  .status.connecting{background:#fef3c7;color:#92400e;}
  .status.connected{background:#dcfce7;color:#166534;}
  .status.error{background:#fee2e2;color:#991b1b;}
  .log{
    margin-top:16px;
    font-size:0.7rem;
    color:#94a3b8;
    max-height:80px;
    overflow-y:auto;
    text-align:left;
    background:#f8fafc;
    border-radius:8px;
    padding:8px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🧪 Test Supabase Realtime</h1>
  <div class="counter" id="counter">–</div>
  <div class="buttons">
    <button class="btn-minus" id="btnMinus">−</button>
    <button class="btn-plus" id="btnPlus">+</button>
  </div>
  <button class="btn-reset" id="btnReset">Reset do 0</button>
  <div class="status connecting" id="status">Łączenie...</div>
  <div class="log" id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';
const ROW_ID = 1;

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const counterEl = document.getElementById('counter');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg){
  const line = document.createElement('div');
  line.textContent = new Date().toLocaleTimeString('pl') + ' — ' + msg;
  logEl.prepend(line);
}

function bump(){
  counterEl.classList.add('bump');
  setTimeout(()=>counterEl.classList.remove('bump'), 200);
}

function setStatus(type, msg){
  statusEl.className = 'status ' + type;
  statusEl.textContent = msg;
}

async function loadValue(){
  const { data, error } = await db
    .from('counter')
    .select('value')
    .eq('id', ROW_ID)
    .single();
  if(error){
    setStatus('error', '❌ Błąd połączenia');
    log('Błąd: ' + error.message);
    return;
  }
  counterEl.textContent = data.value;
  log('Załadowano wartość: ' + data.value);
}

async function updateValue(delta){
  const current = parseInt(counterEl.textContent) || 0;
  const newVal = current + delta;
  const { error } = await db
    .from('counter')
    .update({ value: newVal })
    .eq('id', ROW_ID);
  if(error) log('Błąd zapisu: ' + error.message);
}

async function resetValue(){
  const { error } = await db
    .from('counter')
    .update({ value: 0 })
    .eq('id', ROW_ID);
  if(error) log('Błąd resetu: ' + error.message);
}

function subscribeRealtime(){
  db.channel('counter-channel')
    .on(
      'postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'counter', filter: `id=eq.${ROW_ID}` },
      (payload) => {
        const newVal = payload.new.value;
        counterEl.textContent = newVal;
        bump();
        log('Realtime: zmiana na ' + newVal);
      }
    )
    .subscribe((status) => {
      if(status === 'SUBSCRIBED'){
        setStatus('connected', '✅ Połączono — Realtime aktywny');
        log('Realtime połączony');
      } else if(status === 'CHANNEL_ERROR'){
        setStatus('error', '❌ Błąd Realtime');
        log('Błąd kanału Realtime');
      } else {
        setStatus('connecting', '⏳ Łączenie Realtime...');
      }
    });
}

document.getElementById('btnPlus').onclick = () => updateValue(1);
document.getElementById('btnMinus').onclick = () => updateValue(-1);
document.getElementById('btnReset').onclick = () => resetValue();

loadValue();
subscribeRealtime();
</script>
</body>
</html>
